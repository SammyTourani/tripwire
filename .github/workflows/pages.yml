name: Deploy viz/ to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'viz/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No `npm ci` / package-lock.json: the lockfile is intentionally not
      # tracked because the maintainer's local npm is pinned to a private
      # registry mirror that poisons lockfile `resolved:` URLs. The runner
      # resolves against public npm every build; the dep set is small and
      # pinned to caret-stable versions in package.json.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viz/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
